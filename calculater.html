<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculater</title>
  <link rel="stylesheet" href="calculater.css">
</head>
<body>
  <div class="cal">
  <h1 align="center">Calculator</h1>
  <form>
   <p id="result">Result: </p><br/>
  <label>Enter first number: </label><br/>
  <input type="number" placeholder="Enter first number" id="box1"><br/><br/>
  <label>Enter second number: </label><br/>
  <input type="number" placeholder="Enter second number" id="box2"><br/><br/>
  <form class="operation">
  <button id="add" type="button">+</button>
  <button id="sub" type="button">-</button>
  <button id="div" type="button">/</button>
  <button id="mul" type="button">*</button>
  <br/>
  </form>
   <button type="reset" id="resetbtn">Refresh</button>
  </form>
  </div>
  <script src="calculater.js"></script>
</body>
</html>
